name: Too basic CI concept

on:
  workflow_dispatch:
    inputs:
      scriptName:
        type: string
        description: "Which script you want to run?"
        default: "regression.xml"
        required: true




jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Run Script
        run: mvn clean test -DsuiteXmlFile=${{ inputs.scriptName }}


