name: Basic CI pipelie integeration

on:
  pull_request:
    branches:
      - master

  workflow_dispatch:
    inputs:
      script:
        type: string
        description: Which TestSuite to run?
        default: regression.xml


      select:
        type: choice
        description: Which suite you want to select and run?
        options:
          - smoke.xml
          - regression.xml
        default: regression.xml





jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Run Script
        run: mvn clean test -DsuiteXmlFile=${{inputs.select}}


